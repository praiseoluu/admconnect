<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <meta name="description"
          content="ADMConnect — Your Local Government, Connected." />
    <meta name="theme-color" content="#068927" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="ADMConnect" />
    <meta property="og:description" content="Your Local Government, Connected." />
    <meta property="og:image"       content="/assets/images/og-cover.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ADMConnect" />
    <meta name="twitter:description" content="Your Local Government, Connected." />
    <meta name="twitter:image"       content="/assets/images/og-cover.jpg" />

    <title>ADMConnect</title>

    <!-- Favicon -->
    <link rel="icon"             type="image/svg+xml" href="/assets/icons/adamawa-logo.svg" />
    <link rel="icon"             type="image/png"     href="/assets/icons/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon"                      href="/assets/icons/apple-touch-icon.png" />

    <!--
      Design System
      Load order matters: tokens → reset → utilities.
      Component-level CSS is injected at runtime by the component
      base class via the static `styles` property.
    -->
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/reset.css" />
    <link rel="stylesheet" href="/styles/utilities.css" />

  </head>

  <body>

    <!--
      Single SPA mount point.
      The router replaces the contents of this element on every navigation.
      aria-live="polite" notifies screen readers when the page content changes.
      Do not place any markup here — it will be overwritten on first navigation.
    -->
    <div id="app"
         role="main"
         aria-live="polite"
         aria-label="Page content"></div>

    <!-- Application bootstrap — loaded as an ES module -->
    <script type="module" src="/app.js"></script>

  </body>

</html>
